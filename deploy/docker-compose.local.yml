services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-infowatchtower}
      POSTGRES_USER: ${POSTGRES_USER:-infowatchtower}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infowatchtower} -d ${POSTGRES_DB:-infowatchtower}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  backend:
    build:
      context: ../backend
    env_file:
      - ${INFOWATCHTOWER_ENV_FILE:-./.env}
    environment:
      RUN_MIGRATIONS: "true"
    volumes:
      - ../config:/config:ro
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ../backend
    command: ["python", "-m", "app.workers.worker"]
    env_file:
      - ${INFOWATCHTOWER_ENV_FILE:-./.env}
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - ../config:/config:ro
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: ../backend
    command: ["python", "-m", "app.workers.scheduler"]
    env_file:
      - ${INFOWATCHTOWER_ENV_FILE:-./.env}
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - ../config:/config:ro
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    image: node:22-alpine
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: http://backend:8000
    command: sh -c "test -d node_modules/.vite || npm install && npm run dev"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  frontend_node_modules:
