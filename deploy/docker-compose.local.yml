services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: infowatchtower
      POSTGRES_USER: infowatchtower
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infowatchtower -d infowatchtower"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
    env_file:
      - ../config/env.example
    environment:
      DATABASE_URL: postgresql+psycopg://infowatchtower:change_me@postgres:5432/infowatchtower
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5173
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: password
    volumes:
      - ../config:/config:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ../backend
    command: ["python", "-m", "app.workers.worker"]
    env_file:
      - ../config/env.example
    environment:
      DATABASE_URL: postgresql+psycopg://infowatchtower:change_me@postgres:5432/infowatchtower
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: ../backend
    command: ["python", "-m", "app.workers.scheduler"]
    env_file:
      - ../config/env.example
    environment:
      DATABASE_URL: postgresql+psycopg://infowatchtower:change_me@postgres:5432/infowatchtower
      REDIS_URL: redis://redis:6379/0
      INGESTION_SCHEDULER_ENABLED: "false"
      SCHEDULER_JOB_MODE: daily_pipeline
      DAILY_PIPELINE_RUN_INGESTION: "true"
      DAILY_PIPELINE_CREATE_DAILY_DRAFT: "true"
      DAILY_PIPELINE_RECOMMENDATION_LIMIT: "15"
      DAILY_PIPELINE_SOURCE_DAILY_LIMIT: "2"
    volumes:
      - ../config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    image: node:22-alpine
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: http://backend:8000
    command: sh -c "test -d node_modules/.vite || npm install && npm run dev"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
