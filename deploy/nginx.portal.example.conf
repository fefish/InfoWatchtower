# ============================================================================
# 【门户侧配置样例】本文件不被本系统任何 compose 加载。
# 它演示公司内网门户（portal.example.com）自己的 nginx 应如何以
# "同站路径反代"承载 InfoWatchtower（DEPLOY_MODE=intranet）的 iframe。
# 规格：docs/deployment/deployment-topology.md §4.1；架构决策：同站反代，
# 禁止放开 SameSite=None（等于在无 CSRF 防护面前打开跨站写攻击面）。
#
# 部署前提（deploy/docker-compose.intranet.yml 默认值）：
# - 前端容器只绑门户主机回环：127.0.0.1:8080（FRONTEND_HTTP_BIND）
# - backend 只绑门户主机回环：127.0.0.1:8000（BACKEND_HTTP_BIND），
#   本门户网关是唯一可信入口（契约 hard_constraint：backend 仅可信网关可达）
# - 前端镜像以 VITE_BASE_PATH=/watchtower/ 构建（compose build args 默认）
# - 系统侧 env：EMBED_FRAME_ANCESTORS="'self' https://portal.example.com"，
#   使 HTML/API 响应的 CSP frame-ancestors 放行门户域 iframe
#
# 同站 cookie 说明：iframe 的 src 是 https://portal.example.com/watchtower/，
# 与门户同源（同站），InfoWatchtower 的会话 cookie（SameSite=lax）与 CSRF
# cookie 原样可用，用户在门户登录一次即可在 iframe 内评论/点赞/评分。
# ============================================================================

server {
    listen 443 ssl;
    server_name portal.example.com;

    # ssl_certificate     /etc/nginx/certs/portal.example.com.pem;   # 门户既有证书
    # ssl_certificate_key /etc/nginx/certs/portal.example.com.key;

    # ……门户自身的其他 location ……

    # ------------------------------------------------------------------
    # InfoWatchtower API：门户网关直连 backend（唯一可信身份注入点）。
    # 信任链：浏览器 -> 门户网关（本层，覆盖身份头）-> backend。
    # proxy_set_header 会覆盖浏览器传入的同名头，伪造的 X-Employee-No 在此丢弃；
    # 身份值来自门户 SSO 模块（auth_request / lua / 上游会话服务），下面以
    # $portal_* 变量示意，接入时替换为门户实际的取值方式。
    # 注意 location 顺序：/watchtower/api/ 必须比 /watchtower/ 更精确、优先命中。
    # ------------------------------------------------------------------
    location /watchtower/api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Employee-No   $portal_employee_no;
        proxy_set_header X-Employee-Name $portal_employee_name;
        proxy_set_header X-Department    $portal_department;
        proxy_set_header X-Email         $portal_email;
    }

    # ------------------------------------------------------------------
    # InfoWatchtower 前端：反代到前端容器（静态资源 + SPA fallback）。
    # proxy_pass 结尾的 / 会剥掉 /watchtower 前缀；前端已按
    # VITE_BASE_PATH=/watchtower/ 构建，资源与路由和该子路径一致。
    # 前端容器自身也会输出 CSP frame-ancestors（EMBED_FRAME_ANCESTORS），
    # 与本门户域配合后 iframe 才能通过浏览器嵌入策略校验。
    # ------------------------------------------------------------------
    location /watchtower/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 门户页面里嵌入方式示意：
# <iframe src="https://portal.example.com/watchtower/" ...></iframe>
