services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-infowatchtower}
      POSTGRES_USER: ${POSTGRES_USER:-infowatchtower}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - /srv/infowatchtower/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infowatchtower} -d ${POSTGRES_DB:-infowatchtower}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - /srv/infowatchtower/redis_data:/data

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    env_file:
      - ${INFOWATCHTOWER_ENV_FILE:-/srv/infowatchtower/.env.production}
    environment:
      RUN_MIGRATIONS: "true"
    volumes:
      - ../config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ../backend
    restart: unless-stopped
    command: ["python", "-m", "app.workers.worker"]
    env_file:
      - ${INFOWATCHTOWER_ENV_FILE:-/srv/infowatchtower/.env.production}
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - ../config:/config:ro
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: ../backend
    restart: unless-stopped
    command: ["python", "-m", "app.workers.scheduler"]
    env_file:
      - ${INFOWATCHTOWER_ENV_FILE:-/srv/infowatchtower/.env.production}
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - ../config:/config:ro
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started

  reverse_proxy:
    build:
      context: ../frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
