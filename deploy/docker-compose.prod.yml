services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-infowatchtower}
      POSTGRES_USER: ${POSTGRES_USER:-infowatchtower}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - /srv/infowatchtower/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infowatchtower} -d ${POSTGRES_DB:-infowatchtower}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - /srv/infowatchtower/redis_data:/data

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    env_file:
      - ${INFOWATCHTOWER_ENV_FILE:-/srv/infowatchtower/.env.production}
    environment:
      RUN_MIGRATIONS: "true"
    volumes:
      - ../config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ../backend
    restart: unless-stopped
    command: ["python", "-m", "app.workers.worker"]
    env_file:
      - ${INFOWATCHTOWER_ENV_FILE:-/srv/infowatchtower/.env.production}
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - ../config:/config:ro
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: ../backend
    restart: unless-stopped
    command: ["python", "-m", "app.workers.scheduler"]
    env_file:
      - ${INFOWATCHTOWER_ENV_FILE:-/srv/infowatchtower/.env.production}
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - ../config:/config:ro
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started

  reverse_proxy:
    build:
      context: ../frontend
    restart: unless-stopped
    environment:
      # CSP frame-ancestors 白名单，透传给前端 nginx 的 envsubst 模板（默认仅同源）。
      EMBED_FRAME_ANCESTORS: ${EMBED_FRAME_ANCESTORS:-'self'}
    ports:
      # 启用 tls profile 时把 80 让给 caddy 并只绑回环，例如 FRONTEND_HTTP_PORT=127.0.0.1:8080。
      - "${FRONTEND_HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

  # 可选 TLS 收口（C-6）：docker compose --profile tls up -d 启用。
  # caddy 监听 80/443，按 CADDY_DOMAIN 自动完成 ACME 证书签发与续期，
  # 并把流量透传给前端 nginx（reverse_proxy 服务）。
  # 启用前必须在 env 设置：CADDY_DOMAIN=your-domain.example、FRONTEND_HTTP_PORT=127.0.0.1:8080。
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["tls"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/infowatchtower/caddy_data:/data
      - /srv/infowatchtower/caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      reverse_proxy:
        condition: service_started
