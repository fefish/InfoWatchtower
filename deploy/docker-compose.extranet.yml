# extranet（外网发布者）形态 compose：DEPLOY_MODE=extranet，采集开、sync publisher。
# 与 docker-compose.prod.yml 的差异：
# - env 模板换成 deploy/env.extranet.example -> /srv/infowatchtower/.env.extranet，
#   其中 feed 相关 env（SYNC_SERVICE_TOKENS，为空启动失败）与 OIDC 全套经 env_file
#   注入 backend/worker/scheduler；feed 端点只认 Bearer token，不走登录 cookie。
# - TLS 收口同 prod：可选 caddy profile（feed 面向内网消费者，必须走 443）。
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-infowatchtower}
      POSTGRES_USER: ${POSTGRES_USER:-infowatchtower}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - /srv/infowatchtower/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infowatchtower} -d ${POSTGRES_DB:-infowatchtower}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - /srv/infowatchtower/redis_data:/data

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    env_file:
      # feed 发布与 OIDC 登录所需 env（SYNC_SERVICE_TOKENS、OIDC_*）都在该文件，
      # 见 deploy/env.extranet.example；SYNC_SERVICE_TOKENS 为空会 fail-fast。
      - ${INFOWATCHTOWER_ENV_FILE:-/srv/infowatchtower/.env.extranet}
    environment:
      RUN_MIGRATIONS: "true"
    volumes:
      - ../config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ../backend
    restart: unless-stopped
    command: ["python", "-m", "app.workers.worker"]
    env_file:
      - ${INFOWATCHTOWER_ENV_FILE:-/srv/infowatchtower/.env.extranet}
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - ../config:/config:ro
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: ../backend
    restart: unless-stopped
    command: ["python", "-m", "app.workers.scheduler"]
    env_file:
      - ${INFOWATCHTOWER_ENV_FILE:-/srv/infowatchtower/.env.extranet}
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - ../config:/config:ro
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started

  reverse_proxy:
    build:
      context: ../frontend
    restart: unless-stopped
    environment:
      EMBED_FRAME_ANCESTORS: ${EMBED_FRAME_ANCESTORS:-'self'}
    ports:
      # 启用 tls profile 时把 80 让给 caddy 并只绑回环，例如 FRONTEND_HTTP_PORT=127.0.0.1:8080。
      - "${FRONTEND_HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

  # 可选 TLS 收口（C-6）：docker compose --profile tls up -d 启用，配置同 prod。
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["tls"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/infowatchtower/caddy_data:/data
      - /srv/infowatchtower/caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      reverse_proxy:
        condition: service_started
