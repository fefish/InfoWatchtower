# 本文件是 nginx 官方镜像的 envsubst 模板：frontend/Dockerfile 把它拷到
# /etc/nginx/templates/default.conf.template，容器启动时入口脚本只替换
# 已定义的环境变量占位（这里只有 EMBED_FRAME_ANCESTORS 一个），$host/$uri
# 等 nginx 变量因未出现在环境中而原样保留。
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /healthz {
        proxy_pass http://backend:8000/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 身份头信任链：intranet_header 的身份头只能由更外层的可信门户网关注入
        # （门户直连 backend，见 deploy/nginx.portal.example.conf），不会经过这里。
        # 本层是 standalone/cloud/extranet 的浏览器直连入口，必须清洗外部传入的
        # 身份头，防止伪造工号绕过认证（proxy_set_header 置空即不再向后端传递）。
        proxy_set_header X-Employee-No "";
        proxy_set_header X-Employee-Name "";
        proxy_set_header X-Department "";
        proxy_set_header X-Email "";
    }

    location / {
        try_files $uri $uri/ /index.html;
        # HTML 文档响应是浏览器真正执行嵌入策略的位置：frame-ancestors 白名单
        # 从 EMBED_FRAME_ANCESTORS 注入（默认 'self'），intranet 形态配置为门户域。
        add_header Content-Security-Policy "frame-ancestors ${EMBED_FRAME_ANCESTORS}" always;
    }
}
